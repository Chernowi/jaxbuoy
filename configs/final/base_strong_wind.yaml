run:
  seed: 0
  output_dir: runs

algorithm:
  name: ppo_continuous_rnn_curiosity
  params:
    LR: 0.0003
    CURIOSITY_LR: 0.0003
    CURIOSITY_COEF: 0.05
    CURIOSITY_OUTPUT_DIM: 64
    CURIOSITY_HIDDEN_SIZES: [256, 256]
    CURIOSITY_ACTIVATION: relu
    NUM_ENVS: 256
    NUM_STEPS: 128
    TOTAL_TIMESTEPS: 110000000
    UPDATE_EPOCHS: 4
    NUM_MINIBATCHES: 8
    GAMMA: 0.99
    GAE_LAMBDA: 0.95
    CLIP_EPS: 0.2
    ENT_COEF: 0.02
    VF_COEF: 0.5
    MAX_GRAD_NORM: 0.5
    ACTIVATION: tanh
    HIDDEN_SIZES: [128]
    RNN_HIDDEN_SIZE: 128
    ANNEAL_LR: true
    ANNEAL_EXPLORE_REWARD: true
    EXPLORE_REWARD_START_SCALE: 1.0
    EXPLORE_REWARD_END_SCALE: 0.0
    EXPLORE_REWARD_ANNEAL_FRACTION: 1.0
    NORMALIZE_OBS: false
    NORMALIZE_REWARD: true
    DEBUG: false

environment:
  radius_m: 90.0
  max_steps: 425
  decision_dt_s: 2.0
  action_mode: thruster
  max_speed_mps: 2.0
  constant_speed_mps: 2.0
  max_rudder_deg: 45.0
  rudder_turn_rate: 0.25
  thruster_yaw_rate: 0.6

  find_range_m: 10.0
  find_fov_deg: 90.0
  buoy_spawn_min_center_distance_m: 15.0
  buoy_spawn_max_center_distance_m: 40.0

  found_reward: 70.0
  out_of_bounds_penalty: 70.0
  timeout_penalty: 30.0
  step_reward: -0.1

  use_visited_grid: true
  visited_grid_size: 64
  sensor_range_m: 10.0
  sensor_fov_deg: 90.0
  explore_reward_per_cell: 0.1
  directional_samples: 8
  include_center_distance_obs: false
  include_episode_time_obs: true
  include_current_obs: false
  include_wind_obs: false
  max_current_speed_mps: 0.5
  max_wind_speed_mps: 0.5
  wind_buoy_scale: 0.5

wandb:
  mode: online
  project: jaxbuoy
  entity: null
  tags: [jax, ppo, buoy, rudder, rnn, curiosity]
